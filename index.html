<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>As Time Goes By 手作｜時光造所</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #faf8f5; color: #2c2418; font-family: 'Noto Sans TC', sans-serif; }
    .fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
    .fade-in-delay-1 { animation-delay: 0.1s; }
    .fade-in-delay-2 { animation-delay: 0.2s; }
    .fade-in-delay-3 { animation-delay: 0.3s; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(16px); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.5s ease forwards; }
    .service-card { transition: all 0.3s ease; border: 1px solid #e8e0d4; background: #fff; }
    .service-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
    .time-slot { transition: all 0.2s ease; border: 1px solid #e8e0d4; }
    .time-slot:hover:not(.selected):not(.disabled) { background: #f0ebe3; border-color: #8b7355; }
    .time-slot.selected { background: #2c2418; color: #fff; border-color: #2c2418; }
    .time-slot.disabled { opacity: 0.3; background: #eee; cursor: not-allowed; text-decoration: line-through; }
    .nav-dot { transition: all 0.3s ease; background: #c4b89a; }
    .nav-dot.active { background: #2c2418; transform: scale(1.3); }
    .toast-enter { animation: toastIn 0.4s ease forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    #payment-modal, #detail-modal { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .modal-content { max-height: 85vh; overflow-y: auto; }
  </style>
</head>
<body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <nav class="sticky top-0 z-40 backdrop-blur-md border-b" style="background: rgba(250,248,245,0.92); border-color: #e8e0d4;">
      <div class="px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: #2c2418;">
            <i data-lucide="palette" class="w-4 h-4 text-[#faf8f5]"></i>
          </div>
          <span class="font-semibold text-sm" style="font-family: 'Playfair Display', serif;">時光造所</span>
        </div>
        <div class="flex gap-2">
          <button onclick="showView('home')" id="dot-home" class="nav-dot w-2.5 h-2.5 rounded-full active"></button>
          <button onclick="showView('booking')" id="dot-booking" class="nav-dot w-2.5 h-2.5 rounded-full"></button>
          <button onclick="showView('info')" id="dot-info" class="nav-dot w-2.5 h-2.5 rounded-full"></button>
          <button onclick="showView('records')" id="dot-records" class="nav-dot w-2.5 h-2.5 rounded-full"></button>
        </div>
      </div>
    </nav>

    <section id="view-home">
      <header class="px-4 pt-12 pb-8 text-center">
        <h1 class="fade-in text-3xl font-bold mb-2" style="font-family: 'Playfair Display', serif;">時光造所</h1>
        <p class="fade-in fade-in-delay-1 text-sm font-medium mb-2 text-[#8b7355]">As Time Goes By 手作</p>
        <p class="fade-in fade-in-delay-2 text-xs leading-relaxed mb-6 text-[#8b7355] max-w-xs mx-auto">當時光慢慢流逝，許多事物會悄然消失，但我們至少能把握，這一刻的美好。</p>
        <button onclick="showView('booking')" class="fade-in fade-in-delay-3 inline-flex items-center gap-2 px-8 py-3 rounded-full text-sm font-medium bg-[#2c2418] text-[#faf8f5] hover:shadow-lg transition-all">
          <i data-lucide="calendar-plus" class="w-4 h-4"></i> 立即預約
        </button>
      </header>

      <div class="px-4 pb-12 max-w-2xl mx-auto space-y-6">
        <div class="bg-white rounded-3xl border border-[#e8e0d4] p-6 shadow-sm overflow-hidden fade-in">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-[#fcfaf7] rounded-xl flex items-center justify-center">
                    <i data-lucide="palette" class="w-6 h-6 text-[#2c2418]"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold">水彩速寫體驗</h2>
                    <p class="text-[10px] text-[#8b7355]">Watercolor Sketching Experience</p>
                </div>
            </div>
            <p class="text-xs text-[#8b7355] leading-relaxed mb-6 border-l-2 border-[#e8e0d4] pl-3">
                在專業老師的引導下，零基礎也能輕鬆作畫！<br>
                靜靜地啜飲時光，讓顏色與生活一起沉澱。
            </p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="watercolor-options"></div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="other-services"></div>
      </div>
    </section>

    <div id="detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-6 slide-up modal-content relative shadow-2xl">
            <button onclick="closeDetailModal()" class="absolute top-4 right-4 text-gray-400 hover:text-[#2c2418]"><i data-lucide="x"></i></button>
            <div id="modal-body-content" class="space-y-6 text-sm"></div>
            <button id="modal-confirm-btn" class="w-full mt-8 py-4 bg-[#2c2418] text-white rounded-2xl font-bold shadow-lg transition-transform active:scale-[0.98]">立即預約</button>
        </div>
    </div>

    <section id="view-booking" class="hidden px-4 py-8">
        <div class="max-w-md mx-auto">
            <button onclick="showView('home')" class="flex items-center gap-1 text-sm mb-6 text-[#8b7355] hover:opacity-70">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 返回首頁
            </button>
            <div class="flex items-center justify-center gap-3 mb-8">
                <div id="step-1-indicator" class="flex flex-col items-center gap-1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-[#2c2418] text-white transition-colors">1</div>
                    <span class="text-[10px]">選服務</span>
                </div>
                <div class="w-8 h-px bg-[#e8e0d4]"></div>
                <div id="step-2-indicator" class="flex flex-col items-center gap-1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-[#e8e0d4] text-[#8b7355] transition-colors">2</div>
                    <span class="text-[10px]">選時間</span>
                </div>
                <div class="w-8 h-px bg-[#e8e0d4]"></div>
                <div id="step-3-indicator" class="flex flex-col items-center gap-1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-[#e8e0d4] text-[#8b7355] transition-colors">3</div>
                    <span class="text-[10px]">填資料</span>
                </div>
            </div>

            <div id="booking-steps">
                <div id="step-1" class="slide-up">
                    <div class="bg-white rounded-2xl p-5 border border-[#e8e0d4] mb-4 shadow-sm">
                        <label class="block text-sm font-bold mb-4">請確認預約項目</label>
                        <div id="service-options" class="space-y-3"></div>
                    </div>
                </div>
                <div id="step-2" class="hidden slide-up">
                    <div class="bg-white rounded-2xl p-5 border border-[#e8e0d4] mb-4 shadow-sm">
                        <div id="calendar-container">
                            <div class="flex justify-between items-center mb-4">
                                <button onclick="changeMonth(-1)" class="p-1 rounded-full hover:bg-gray-100"><i data-lucide="chevron-left"></i></button>
                                <span id="calendar-month" class="font-bold text-sm"></span>
                                <button onclick="changeMonth(1)" class="p-1 rounded-full hover:bg-gray-100"><i data-lucide="chevron-right"></i></button>
                            </div>
                            <div class="grid grid-cols-7 gap-1 text-center text-[10px] mb-2 text-[#8b7355] font-bold">
                                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                            </div>
                            <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
                        </div>
                        <div id="time-section" class="mt-6 hidden pt-6 border-t border-dashed border-[#e8e0d4]">
                            <label class="block text-sm font-bold mb-3">選擇預約時段 (教學時長90分鐘)</label>
                            <div id="time-slots" class="grid grid-cols-3 gap-2"></div>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="goToStep(1)" class="flex-1 py-4 bg-[#f0ebe3] rounded-2xl text-sm font-medium text-[#2c2418]">上一步</button>
                        <button id="btn-to-step3" onclick="goToStep(3)" disabled class="flex-1 py-4 bg-[#2c2418] text-white rounded-2xl text-sm font-medium opacity-50 transition-all">下一步</button>
                    </div>
                </div>

                <div id="step-3" class="hidden slide-up">
                    <form id="main-booking-form" onsubmit="event.preventDefault(); showPaymentModal();" class="space-y-4">
                        <div class="bg-white rounded-2xl p-5 border border-[#e8e0d4] shadow-sm">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold mb-1 text-[#8b7355]">您的姓名 *</label>
                                    <input type="text" id="input-name" required class="w-full p-3 bg-[#faf8f5] rounded-xl text-sm border border-[#e8e0d4] focus:border-[#2c2418] outline-none transition-colors">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold mb-1 text-[#8b7355]">聯繫電話 *</label>
                                    <input type="tel" id="input-phone" required class="w-full p-3 bg-[#faf8f5] rounded-xl text-sm border border-[#e8e0d4] focus:border-[#2c2418] outline-none transition-colors">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold mb-1 text-[#8b7355]">電子郵件 *</label>
                                    <input type="email" id="input-email" required class="w-full p-3 bg-[#faf8f5] rounded-xl text-sm border border-[#e8e0d4] focus:border-[#2c2418] outline-none transition-colors" placeholder="用於寄送確認信件">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold mb-1 text-[#8b7355]">預約人數 * (每時段上限8人)</label>
                                    <select id="input-people" onchange="calculatePrice()" required class="w-full p-3 bg-[#faf8f5] rounded-xl text-sm border border-[#e8e0d4] outline-none focus:border-[#2c2418]">
                                        <option value="1">1 人</option>
                                        <option value="2">2 人</option>
                                        <option value="3">3 人</option>
                                        <option value="4">4 人</option>
                                        <option value="5">5 人</option>
                                        <option value="6">6 人</option>
                                        <option value="7">7 人</option>
                                        <option value="8">8 人</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold mb-1 text-[#8b7355]">備註事項</label>
                                    <textarea id="input-notes" rows="3" class="w-full p-3 bg-[#faf8f5] rounded-xl text-sm border border-[#e8e0d4] focus:border-[#2c2418] outline-none transition-colors" placeholder="如果有特殊需求請告知我們..."></textarea>
                                </div>
                            </div>
                        </div>
                        <div id="confirm-box" class="bg-[#fcfaf7] p-4 rounded-2xl text-xs border border-dashed border-[#c4b89a] space-y-2"></div>
                        <div id="price-box" class="bg-white p-5 rounded-2xl border-2 border-[#2c2418] shadow-sm">
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-bold text-[#8b7355]">預約金額明細</span>
                                <span id="total-price-display" class="text-xl font-bold text-[#2c2418]">NT$ 0</span>
                            </div>
                            <div id="price-detail-text" class="text-[10px] text-gray-400 mt-1">方案單價 × 人數</div>
                        </div>
                        <div class="flex gap-3">
                            <button type="button" onclick="goToStep(2)" class="flex-1 py-4 bg-[#f0ebe3] rounded-2xl text-sm font-medium">上一步</button>
                            <button type="submit" class="flex-1 py-4 bg-[#2c2418] text-white rounded-2xl text-sm font-medium shadow-md">前往付款</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="payment-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-sm p-6 slide-up shadow-2xl">
            <h3 class="font-bold text-center mb-6 text-lg">選擇付款方式</h3>
            <div class="space-y-3">
                <button onclick="executePayment('Credit Card')" class="w-full py-4 border border-[#e8e0d4] rounded-2xl flex items-center justify-between px-5 hover:bg-gray-50 transition-all active:scale-[0.98]">
                    <span class="text-sm font-bold text-[#2c2418]">信用卡 (藍新金流)</span>
                    <i data-lucide="credit-card" class="w-5 h-5 text-[#8b7355]"></i>
                </button>
                <button onclick="executePayment('Line Pay')" class="w-full py-4 border border-[#e8e0d4] rounded-2xl flex items-center justify-between px-5 hover:bg-gray-50 transition-all active:scale-[0.98]">
                    <span class="text-sm font-bold text-[#2c2418]">LINE Pay</span>
                    <div class="w-12 h-5 bg-[#00c300] rounded text-[8px] text-white flex items-center justify-center font-bold">LINE Pay</div>
                </button>
            </div>
            <button onclick="closePaymentModal()" class="w-full mt-6 text-xs text-[#c4b89a] underline hover:text-[#8b7355]">取消預約並返回</button>
        </div>
    </div>

    <section id="view-info" class="hidden px-4 py-8">
        <div class="max-w-md mx-auto space-y-4">
            <div class="bg-white p-6 rounded-2xl border border-[#e8e0d4] shadow-sm">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4 text-[#8b7355]"></i> 店家位置</h3>
                <p class="text-sm text-[#8b7355]">新北市板橋區民生路三段122號2樓</p>
                <a href="https://maps.app.goo.gl/YourMapLink" target="_blank" class="mt-4 inline-block text-xs text-blue-500 underline">在 Google 地圖中開啟</a>
            </div>
        </div>
    </section>

    <section id="view-records" class="hidden px-4 py-8">
        <div class="max-w-md mx-auto text-center py-20">
            <i data-lucide="calendar-x" class="w-12 h-12 mx-auto text-[#c4b89a] mb-4"></i>
            <p class="text-sm text-[#8b7355]">目前尚未有您的預約紀錄</p>
        </div>
    </section>

    <footer class="py-12 text-center text-[10px] text-[#c4b89a] border-t border-[#e8e0d4] mt-12">
      © 時光造所 — 讓每一刻都成為回憶
    </footer>
  </div>

  <script>
    const SCRIPT_URL = "你的_GOOGLE_APPS_SCRIPT_網址";

    const watercolorOptions = [
      { id: 'wa', name: '【水彩速寫體驗｜A款】', subName: '經典小風景', spec: '9 x 13 cm 水彩紙畫框', price: 699, drink: '附飲品一杯' },
      { id: 'wb', name: '【水彩速寫體驗｜B款】', subName: '溫暖的陪伴', spec: '5.5 x 9 cm 壓克力磁鐵 x1 或 5 x 5 cm 壓克力磁鐵 x2', price: 750, drink: '附飲品一杯' },
      { id: 'wc', name: '【熱銷！水彩速寫體驗｜C款】', subName: '完美典藏', spec: '9.5 x 12 cm 壓克力磁鐵', price: 799, drink: '附飲品一杯' },
      { id: 'wd', name: '【水彩速寫體驗｜D款】', subName: '完整創作款', spec: '13.5 x 20 cm 水彩紙', price: 899, drink: '附飲品一杯' }
    ];

    const otherServices = [
      { id: 'beads', name: '手作別針串珠 DIY', icon: 'sparkles', desc: '創意手作，做出獨一無二的飾品', price: 0 },
      { id: 'studio', name: '攝影棚預約', icon: 'camera', desc: '專業攝影空間，完善的器材與佈景', price: 0 }
    ];

    const timeSlots = ["12:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00","18:30"];
    
    let bookedData = {}; 

    let state = {
      view: 'home',
      step: 1,
      service: null,
      unitPrice: 0,
      totalPrice: 0,
      date: null,
      time: null,
      month: new Date()
    };

    function init() {
        const wcContainer = document.getElementById('watercolor-options');
        watercolorOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'flex flex-col text-left p-4 rounded-2xl border border-[#e8e0d4] hover:bg-[#faf8f5] hover:border-[#2c2418] transition-all group';
            btn.innerHTML = `
                <span class="text-[10px] font-bold text-[#8b7355] group-hover:text-[#2c2418]">${opt.name}</span>
                <span class="text-sm font-bold text-[#2c2418] mt-1">${opt.subName}</span>
                <span class="text-[10px] text-red-700 font-bold mt-1">NT$ ${opt.price}</span>
            `;
            btn.onclick = () => showDetailModal(opt);
            wcContainer.appendChild(btn);
        });

        const otherContainer = document.getElementById('other-services');
        otherServices.forEach(s => {
            const card = document.createElement('div');
            card.className = 'service-card p-5 rounded-3xl cursor-pointer fade-in';
            card.innerHTML = `
                <div class="w-10 h-10 bg-[#fcfaf7] rounded-xl flex items-center justify-center mb-4">
                    <i data-lucide="${s.icon}" class="w-5 h-5 text-[#8b7355]"></i>
                </div>
                <h3 class="font-bold text-sm mb-1">${s.name}</h3>
                <p class="text-xs text-[#8b7355]">${s.desc}</p>
            `;
            card.onclick = () => {
                state.service = s.name;
                state.unitPrice = s.price;
                showView('booking');
                goToStep(1); // 確保從首頁進入時正確停在第一步渲染選單
            };
            otherContainer.appendChild(card);
        });
        renderCalendar();
        lucide.createIcons();
    }

    function showDetailModal(opt) {
        const content = document.getElementById('modal-body-content');
        content.innerHTML = `
            <div class="pb-4">
                <h2 class="text-lg font-bold text-[#2c2418]">${opt.name}</h2>
                <p class="text-sm font-bold text-red-700 mt-1">單人費用：NT$ ${opt.price}</p>
                <p class="text-xs text-[#8b7355]">${opt.subName} (${opt.drink}) - ${opt.spec}</p>
            </div>

            <div class="border-t pt-4">
                <h4 class="font-bold flex items-center gap-2 mb-2 text-[#2c2418]"><i data-lucide="user" class="w-4 h-4"></i> 師資介紹</h4>
                <p class="text-[11px] leading-relaxed text-[#8b7355]">
                    三三畫室黃老師曾任教於大學及社區大學多年，相信「每個人都能畫出心裡最美的風景」！<br>
                    老師擅長細膩引導與因材施教，讓學習不再有壓力，即使零基礎，也能慢慢愛上畫畫，在創作裡找到屬於自己的節奏。<br>
                    <a href="https://reurl.cc/bd6blr" target="_blank" class="text-blue-500 underline font-medium mt-1 inline-block">「三三畫室」粉絲專頁</a>
                </p>
            </div>

            <div class="border-t pt-4">
                <h4 class="font-bold flex items-center gap-2 mb-2 text-xs text-[#2c2418]"><i data-lucide="info" class="w-4 h-4"></i> 水彩速寫體驗規則</h4>
                <ul class="text-[10px] space-y-1 text-[#8b7355] list-none">
                    <li># 不須預約一人即可上課；因位子有限，建議先預約比較保險</li>
                    <li># 同一時段人數上限8人</li>
                    <li># 提供數十種速寫範例選圖（花草／風景／甜點／建築／人物／動物／生活雜貨等）</li>
                    <li># 預約須先付款，若當日無法前來，可保留名額擇日再約。</li>
                    <li># 因系統關係，一次只能預約一人，如有多人預約請分次下單，造成不便請見諒。</li>
                    <li># 套餐內含 $120 經典飲品，更換其他特調飲品僅需補差額即可享有。</li>
                </ul>
            </div>

            <div class="bg-[#fcfaf7] p-4 rounded-2xl border border-[#e8e0d4]">
                <h4 class="font-bold text-[#2c2418] mb-2 text-xs flex items-center gap-2"><i data-lucide="gift" class="w-4 h-4 text-red-400"></i> ❤ 限定好禮 ❤</h4>
                <ul class="text-[10px] space-y-1 text-[#8b7355] list-none">
                    <li># 預約手作體驗套餐，現場「打卡分享」並「首次加入官方 LINE」： 每人現場領取 $50 元時光造所選物店購物金！( 免低消、可立刻折抵選物店商品)</li>
                    <li># 12歲以下小朋友：贈送夾娃娃 2 次</li>
                </ul>
            </div>

            <div class="border-t pt-4">
                <h4 class="font-bold text-red-600 mb-2 text-xs flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i> ⚠️ 預約退改須知 (必讀)</h4>
                <div class="text-[10px] space-y-2 text-[#8b7355]">
                    <p><b>【 預約付款 】</b> 本店採全額預付制，完成付款後方保留名額或時段。</p>
                    <p><b>【 全額退款 】</b> 預約日 2 天前可自行於系統取消，將提供全額退費。</p>
                    <p><b>【 預約 2 天內 】</b> 系統將自動關閉取消功能：恕不接受退費。僅限聯繫 IG @astimegoesby_handmade 更改日期一次（須於 3 個月內使用完畢）。</p>
                    <p><b>【 天災政策 】</b> 如遇颱風等天災，以新北市政府公告停班停課為準，當日預約可全額退費或改期。</p>
                    <p><b>【 準時入場 】</b> 預約時段固定，遲到恕不補時；無故未到視同放棄，不予退費或改期。</p>
                </div>
            </div>
        `;
        const btn = document.getElementById('modal-confirm-btn');
        btn.onclick = () => {
            state.service = `${opt.name} ${opt.subName}`;
            state.unitPrice = opt.price;
            closeDetailModal();
            showView('booking');
            goToStep(1); // 跳轉到第一步顯示選單
        };
        document.getElementById('detail-modal').classList.remove('hidden');
        lucide.createIcons();
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    function showView(view) {
        state.view = view;
        ['home', 'booking', 'info', 'records'].forEach(v => {
            document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
            document.getElementById(`dot-${v}`).classList.toggle('active', v === view);
        });
        window.scrollTo(0,0);
    }

    function goToStep(step) {
        state.step = step;
        [1, 2, 3].forEach(s => {
            const stepEl = document.getElementById(`step-${s}`);
            if (stepEl) stepEl.classList.toggle('hidden', s !== step);
            const ind = document.getElementById(`step-${s}-indicator`).querySelector('div');
            if(s <= step) {
                ind.classList.replace('bg-[#e8e0d4]', 'bg-[#2c2418]');
                ind.classList.replace('text-[#8b7355]', 'text-white');
            } else {
                ind.classList.replace('bg-[#2c2418]', 'bg-[#e8e0d4]');
                ind.classList.replace('text-white', 'text-[#8b7355]');
            }
        });
        if(step === 1) renderServiceSelection();
        if(step === 3) {
            updateSummary();
            calculatePrice();
        }
    }

    function handleServiceChange(e) {
        const selectedId = e.target.value;
        const allOptions = [...watercolorOptions, ...otherServices];
        const selectedOption = allOptions.find(opt => opt.id === selectedId);
        
        if (selectedOption) {
            state.service = selectedOption.subName ? `${selectedOption.name} ${selectedOption.subName}` : selectedOption.name;
            state.unitPrice = selectedOption.price;
        }
    }

    function renderServiceSelection() {
        const allServices = [
            ...watercolorOptions.map(opt => ({ id: opt.id, label: `${opt.name} ${opt.subName} - NT$ ${opt.price}`, nameOnly: `${opt.name} ${opt.subName}` })),
            ...otherServices.map(s => ({ id: s.id, label: `${s.name} - NT$ ${s.price}`, nameOnly: s.name }))
        ];

        let optionsHtml = allServices.map(s => {
            const isSelected = (state.service === s.nameOnly) ? 'selected' : '';
            return `<option value="${s.id}" ${isSelected}>${s.label}</option>`;
        }).join('');

        const container = document.getElementById('service-options');
        if (container) {
            container.innerHTML = `
                <div class="relative">
                    <select id="service-dropdown" onchange="handleServiceChange(event)" class="w-full p-4 bg-[#fcfaf7] rounded-xl border border-[#2c2418] text-sm font-bold appearance-none outline-none focus:ring-2 focus:ring-[#2c2418]">
                        ${optionsHtml}
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                        <i data-lucide="chevron-down" class="w-5 h-5 text-[#2c2418]"></i>
                    </div>
                </div>
                <button onclick="goToStep(2)" class="w-full mt-4 py-4 bg-[#2c2418] text-white rounded-2xl font-bold transition-all active:scale-[0.98] shadow-md">下一步</button>
            `;
            lucide.createIcons();
        }
    }

    function calculatePrice() {
        const peopleSelect = document.getElementById('input-people');
        const people = peopleSelect ? parseInt(peopleSelect.value) : 1;
        state.totalPrice = state.unitPrice * people;
        const display = document.getElementById('total-price-display');
        const detail = document.getElementById('price-detail-text');
        if (display) display.innerText = `NT$ ${state.totalPrice}`;
        if (detail) detail.innerText = `明細：NT$ ${state.unitPrice} × ${people} 人`;
    }

    function updateSummary() {
        const box = document.getElementById('confirm-box');
        if (box) {
            box.innerHTML = `
                <div class="flex justify-between border-b pb-2"><span>項目</span><span class="font-bold text-right">${state.service}</span></div>
                <div class="flex justify-between py-2"><span>時間</span><span class="font-bold">${state.date} ${state.time}</span></div>
            `;
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const label = document.getElementById('calendar-month');
        if (!grid || !label) return;
        const y = state.month.getFullYear(), m = state.month.getMonth();
        label.innerText = `${y} 年 ${m + 1} 月`;
        grid.innerHTML = '';
        const first = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const btn = document.createElement('button');
            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            btn.innerText = d;
            btn.className = `w-full aspect-square text-xs rounded-xl transition-all ${state.date === dStr ? 'bg-[#2c2418] text-white shadow-md' : 'hover:bg-gray-100'}`;
            btn.onclick = () => { 
                state.date = dStr; 
                renderCalendar(); 
                const timeSec = document.getElementById('time-section');
                if (timeSec) timeSec.classList.remove('hidden'); 
                renderTimes(); 
            };
            grid.appendChild(btn);
        }
    }

    function changeMonth(n) { state.month.setMonth(state.month.getMonth() + n); renderCalendar(); }

    function renderTimes() {
        const container = document.getElementById('time-slots');
        if (!container) return;
        container.innerHTML = '';
        const dailyBookings = bookedData[state.date] || {};

        timeSlots.forEach((t, index) => {
            const b = document.createElement('button');
            b.innerText = t;
            let isFull = false;
            const checkIndices = [index, index - 1, index - 2];
            checkIndices.forEach(idx => {
                if (idx >= 0) {
                    const checkTime = timeSlots[idx];
                    if ((dailyBookings[checkTime] || 0) >= 8) isFull = true;
                }
            });

            if (isFull) {
                b.className = "time-slot py-3 text-xs border rounded-xl disabled";
                b.disabled = true;
            } else {
                b.className = `time-slot py-3 text-xs border rounded-xl font-bold transition-all ${state.time === t ? 'bg-[#2c2418] text-white border-[#2c2418]' : 'border-[#e8e0d4]'}`;
                b.onclick = () => { 
                    state.time = t; 
                    renderTimes(); 
                    const nextBtn = document.getElementById('btn-to-step3');
                    if (nextBtn) {
                        nextBtn.disabled = false; 
                        nextBtn.classList.remove('opacity-50'); 
                    }
                };
            }
            container.appendChild(b);
        });
    }

    function showPaymentModal() { document.getElementById('payment-modal').classList.remove('hidden'); }
    function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); }

    async function executePayment(method) {
        closePaymentModal();
        const email = document.getElementById('input-email').value;
        const name = document.getElementById('input-name').value;
        showToast(`正在發起 ${method} 付款...`, 'success');

        const formData = new FormData();
        formData.append('name', name);
        formData.append('phone', document.getElementById('input-phone').value);
        formData.append('email', email);
        formData.append('people', document.getElementById('input-people').value);
        formData.append('service', state.service);
        formData.append('date', state.date);
        formData.append('time', state.time);
        formData.append('amount', state.totalPrice);
        formData.append('payment_method', method);

        try {
            if(SCRIPT_URL !== "你的_GOOGLE_APPS_SCRIPT_網址") {
                await fetch(SCRIPT_URL, { method: 'POST', body: formData });
            }
            setTimeout(() => {
                alert(`付款成功！\n\n預約項目：${state.service}\n總金額：NT$ ${state.totalPrice}\n確認信已寄至：${email}`);
                location.reload();
            }, 2000);
        } catch (e) {
            showToast("系統忙碌中，請聯繫店主。", "error");
        }
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast-enter p-4 bg-[#2c2418] text-white rounded-xl text-xs font-bold z-[100]';
        t.innerText = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    init();
  </script>
</body>
</html>
